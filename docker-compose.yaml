x-airflow-common:
  &airflow-common
  image: apache/airflow:2.8.1
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    AIRFLOW_CONN_XKCD_API: 'https://xkcd.com/'
    PYTHONPATH: /opt/airflow
    _PIP_ADDITIONAL_REQUIREMENTS: |
      requests==2.31.0
      psycopg2-binary
      dbt-core
      dbt-postgres
      pandas
      sqlalchemy
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./src:/opt/airflow/src
    - ./dbt:/opt/airflow/dbt
  user: "50000:0"
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - xkcd-network

services:
  postgres:
    image: postgres:15
    container_name: xkcd-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5
    restart: always
    networks:
      - xkcd-network

  airflow-init:
    <<: *airflow-common
    container_name: xkcd-airflow-init
    command: bash -c "airflow db init && airflow users create --username airflow --password airflow --firstname Gokul --lastname MS --role Admin --email admin@admin.com"

  airflow-webserver:
    <<: *airflow-common
    container_name: xkcd-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    container_name: xkcd-airflow-scheduler
    command: scheduler
    restart: always

  pgadmin:
    image: dpage/pgadmin4
    container_name: xkcd-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    restart: always
    networks:
      - xkcd-network

networks:
  xkcd-network:
    driver: bridge

volumes:
  postgres-data:
  pgadmin-data:
